---
layout: default
is_post?: true
---

<article>
  <div class="metadata">
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.date %}
    <p class="post-date">
      published on
      <time datetime="{{ post.date }}">
	{{ page.date | date: "%a. %b. %d %Y" | downcase }}
      </time>
    </p>
    {% endif %}
  </div>
{{ content }}
</article>
